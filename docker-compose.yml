services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: all_in_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d all_in_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-db:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command: ["python", "scripts/init_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/all_in_ai
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/all_in_ai
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/all_in_ai
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/all_in_ai
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "false"
    expose:
      - "8000"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
