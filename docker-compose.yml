services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: all_in_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d all_in_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-db:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/all_in_ai
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/all_in_ai
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "false"
    command: ["python", "scripts/init_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/all_in_ai
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/all_in_ai
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
